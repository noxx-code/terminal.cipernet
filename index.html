<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WebLinux Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;font-family:'JetBrains Mono','Courier New',monospace;touch-action:manipulation}
#terminal{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:8px 12px;padding-bottom:60px;font-size:14px;line-height:1.5;color:#c9d1d9;white-space:pre-wrap;word-wrap:break-word;outline:none;caret-color:transparent;-webkit-tap-highlight-color:transparent;-webkit-overflow-scrolling:touch}
#terminal::-webkit-scrollbar{width:8px}
#terminal::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
#terminal::-webkit-scrollbar-track{background:transparent}
.prompt-user{color:#7ee787;font-weight:700}
.prompt-path{color:#58a6ff;font-weight:700}
.prompt-sym{color:#c9d1d9}
.cursor-char{background:#58a6ff;color:#0d1117}
.cursor-blink{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{background:#58a6ff;color:#0d1117}50%{background:transparent;color:#c9d1d9}}
.output-line{display:block;min-height:1em}
.tb-btn{
  background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:5px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  padding:8px 10px;min-width:36px;text-align:center;cursor:pointer;
  flex-shrink:0;user-select:none;-webkit-user-select:none;
  transition:background 0.1s;
}
.tb-btn:active{background:#388bfd;border-color:#58a6ff}
.tb-btn.special{color:#7ee787;font-weight:700}
.tb-btn.danger{color:#ff7b72}
.tb-sep{width:1px;background:#30363d;margin:2px 1px;flex-shrink:0}

@media (max-width: 768px){
  #terminal{font-size:13px;padding:6px 8px;padding-bottom:56px}
  #mobile-toolbar{display:block}
}
@media (max-width: 480px){
  #terminal{font-size:12px;padding:4px 6px;padding-bottom:56px}
  .tb-btn{padding:7px 8px;font-size:11px;min-width:32px}
}
</style>
</head>
<body>
<div id="terminal" tabindex="0"></div>
<textarea id="mobile-input" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
<div id="mobile-toolbar">
  <div class="tb-row">
    <button class="tb-btn special" data-key="Tab">Tab</button>
    <button class="tb-btn" data-key="ArrowUp">&#9650;</button>
    <button class="tb-btn" data-key="ArrowDown">&#9660;</button>
    <button class="tb-btn" data-key="ArrowLeft">&#9664;</button>
    <button class="tb-btn" data-key="ArrowRight">&#9654;</button>
    <div class="tb-sep"></div>
    <button class="tb-btn danger" data-ctrl="c">^C</button>
    <button class="tb-btn" data-ctrl="l">^L</button>
    <button class="tb-btn" data-ctrl="a">^A</button>
    <button class="tb-btn" data-ctrl="e">^E</button>
    <button class="tb-btn" data-ctrl="u">^U</button>
    <button class="tb-btn" data-ctrl="w">^W</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-insert="|">|</button>
    <button class="tb-btn" data-insert=">">&gt;</button>
    <button class="tb-btn" data-insert="<">&lt;</button>
    <button class="tb-btn" data-insert="/">/</button>
    <button class="tb-btn" data-insert="~">~</button>
    <button class="tb-btn" data-insert="-">-</button>
    <button class="tb-btn" data-insert="_">_</button>
    <button class="tb-btn" data-insert=".">.</button>
    <button class="tb-btn" data-insert="$">$</button>
    <button class="tb-btn" data-insert="'">'</button>
    <button class="tb-btn" data-insert='"'>"</button>
    <button class="tb-btn" data-insert="*">*</button>
    <button class="tb-btn" data-insert=";">;</button>
    <button class="tb-btn" data-insert="&">&amp;</button>
  </div>
</div>
<script>
"use strict";

/* ====== ANSI PARSER ====== */
const Ansi=(()=>{
  const FG={30:'#6e7681',31:'#ff7b72',32:'#7ee787',33:'#d29922',34:'#58a6ff',35:'#bc8cff',36:'#39d2e0',37:'#f0f6fc',
    90:'#8b949e',91:'#ffa198',92:'#a5f3b5',93:'#e3b341',94:'#79c0ff',95:'#d2a8ff',96:'#56d4dd',97:'#f0f6fc'};
  function toHtml(str){
    if(!str)return'';let o='',fg='',bold=false,rev=false,i=0;
    while(i<str.length){
      if(str[i]==='\x1b'&&str[i+1]==='['){
        let j=i+2,code='';
        while(j<str.length&&!(/[A-Za-z]/).test(str[j])){code+=str[j];j++}
        if(str[j]==='m'){
          const codes=code.split(';').map(Number);
          for(const c of codes){
            if(c===0){if(fg||bold||rev)o+='</span>';fg='';bold=false;rev=false}
            else if(c===1){if(fg||bold||rev)o+='</span>';bold=true;o+=sp(fg,bold,rev)}
            else if(c===7){if(fg||bold||rev)o+='</span>';rev=true;o+=sp(fg,bold,rev)}
            else if((c>=30&&c<=37)||(c>=90&&c<=97)){if(fg||bold||rev)o+='</span>';fg=FG[c]||'';o+=sp(fg,bold,rev)}
          }
        }
        i=j+1;continue;
      }
      if(str[i]==='<')o+='&lt;';else if(str[i]==='>')o+='&gt;';else if(str[i]==='&')o+='&amp;';else o+=str[i];
      i++;
    }
    if(fg||bold||rev)o+='</span>';return o;
  }
  function sp(fg,bold,rev){
    let s='<span style="';
    if(rev)s+='background:#c9d1d9;color:#0d1117;';else if(fg)s+='color:'+fg+';';
    if(bold)s+='font-weight:700;';
    return s+'">';
  }
  return{toHtml};
})();

/* ====== VFS ====== */
const VFS=(()=>{
  const now=()=>new Date().toISOString();
  function mkN(name,type,o={}){return{name,type,content:o.content||'',children:type==='directory'?{}:null,permissions:o.permissions||(type==='directory'?'drwxr-xr-x':'-rw-r--r--'),owner:o.owner||'user',group:o.group||'user',createdAt:o.createdAt||now(),modifiedAt:o.modifiedAt||now(),size:o.content?o.content.length:(type==='directory'?4096:0),link:o.link||null}}
  const root=mkN('/','directory',{owner:'root',group:'root'});
  function _mkdirp(p){const pts=p.split('/').filter(Boolean);let c=root;for(const x of pts){if(!c.children[x])c.children[x]=mkN(x,'directory');c=c.children[x]}return c}
  function _mkfile(p,ct,o={}){const pts=p.split('/').filter(Boolean);const fn=pts.pop();let c=root;for(const x of pts){if(!c.children[x])c.children[x]=mkN(x,'directory');c=c.children[x]}c.children[fn]=mkN(fn,'file',{content:ct,...o});c.children[fn].size=ct.length;return c.children[fn]}
  function resolve(ps,cwd){
    if(!ps)return cwd.split('/').filter(Boolean);
    let n=ps;if(n.startsWith('~'))n='/home/user'+n.slice(1);
    let pts;if(n.startsWith('/'))pts=n.split('/').filter(Boolean);else pts=[...cwd.split('/').filter(Boolean),...n.split('/').filter(Boolean)];
    const r=[];for(const p of pts){if(p==='.')continue;else if(p==='..'){if(r.length)r.pop()}else r.push(p)}return r;
  }
  function absStr(ps,cwd){return'/'+resolve(ps,cwd).join('/')}
  function getN(ps,cwd){const pts=resolve(ps,cwd);let c=root;for(const p of pts){if(!c||c.type!=='directory'||!c.children[p])return null;c=c.children[p];if(c.link){const ln=getN(c.link,'/');if(ln)c=ln;else return null}}return c}
  function getPN(ps,cwd){const pts=resolve(ps,cwd);if(!pts.length)return{parent:null,name:'/'};const name=pts.pop();let c=root;for(const p of pts){if(!c||c.type!=='directory'||!c.children[p])return{parent:null,name};c=c.children[p]}return{parent:c,name}}
  function read(ps,cwd){const n=getN(ps,cwd);if(!n||n.type!=='file')return null;return n.content}
  function write(ps,cwd,ct){const{parent:p,name}=getPN(ps,cwd);if(!p)return false;if(p.children[name]&&p.children[name].type==='directory')return false;if(p.children[name]){p.children[name].content=ct;p.children[name].size=ct.length;p.children[name].modifiedAt=now()}else{p.children[name]=mkN(name,'file',{content:ct});p.children[name].size=ct.length}return true}
  function append(ps,cwd,ct){const{parent:p,name}=getPN(ps,cwd);if(!p)return false;if(p.children[name]){if(p.children[name].type==='directory')return false;p.children[name].content+=ct;p.children[name].size=p.children[name].content.length;p.children[name].modifiedAt=now()}else{p.children[name]=mkN(name,'file',{content:ct});p.children[name].size=ct.length}return true}
  function mkdir(ps,cwd){const{parent:p,name}=getPN(ps,cwd);if(!p)return'mkdir: cannot create directory: No such file or directory';if(p.children[name])return`mkdir: cannot create directory '${name}': File exists`;p.children[name]=mkN(name,'directory');return null}
  function rm(ps,cwd,rec=false){const{parent:p,name}=getPN(ps,cwd);if(!p||!p.children[name])return`rm: cannot remove '${ps}': No such file or directory`;if(p.children[name].type==='directory'&&!rec)return`rm: cannot remove '${ps}': Is a directory`;delete p.children[name];return null}
  function cp(src,dst,cwd){
    const sn=getN(src,cwd);if(!sn)return`cp: cannot stat '${src}': No such file or directory`;
    const dn=getN(dst,cwd);const{parent:dp,name:dname}=getPN(dst,cwd);
    function dc(n,nn){const c=mkN(nn||n.name,n.type,{content:n.content,permissions:n.permissions,owner:n.owner,group:n.group});if(n.type==='directory'&&n.children)for(const[k,v]of Object.entries(n.children))c.children[k]=dc(v);c.size=n.size;return c}
    if(dn&&dn.type==='directory')dn.children[sn.name]=dc(sn);else if(dp)dp.children[dname]=dc(sn,dname);else return`cp: target '${dst}': No such file or directory`;return null}
  function mv(src,dst,cwd){
    const{parent:sp,name:sn}=getPN(src,cwd);if(!sp||!sp.children[sn])return`mv: cannot stat '${src}': No such file or directory`;
    const srcN=sp.children[sn];const dn=getN(dst,cwd);const{parent:dp,name:dname}=getPN(dst,cwd);
    if(dn&&dn.type==='directory')dn.children[sn]=srcN;else if(dp){dp.children[dname]=srcN;dp.children[dname].name=dname}else return`mv: target '${dst}': No such file or directory`;
    delete sp.children[sn];return null}
  function ln(src,dst,cwd){
    const{parent:dp,name:dname}=getPN(dst,cwd);if(!dp)return`ln: failed to create link '${dst}': No such file or directory`;
    const absSrc=absStr(src,cwd);
    dp.children[dname]=mkN(dname,'file',{content:'',permissions:'lrwxrwxrwx',link:absSrc});return null}
  function findN(sp,cwd,pred){
    const sn=getN(sp,cwd);if(!sn||sn.type!=='directory')return[];const res=[];const pfx=absStr(sp,cwd);
    function walk(n,p){if(pred(n,p))res.push(p);if(n.type==='directory'&&n.children)for(const[k,v]of Object.entries(n.children))walk(v,p==='/'?'/'+k:p+'/'+k)}
    walk(sn,pfx==='/'?'/':pfx);return res}
  function completions(partial,cwd){
    if(!partial){const n=getN('.',cwd);if(!n||n.type!=='directory')return[];return Object.entries(n.children).map(([k,v])=>k+(v.type==='directory'?'/':''))}
    const ls=partial.lastIndexOf('/');let dp,fp;
    if(ls===-1){dp='.';fp=partial}else{dp=partial.substring(0,ls)||'/';fp=partial.substring(ls+1)}
    const dn=getN(dp,cwd);if(!dn||dn.type!=='directory')return[];
    const m=[];for(const[k,v]of Object.entries(dn.children)){if(k.startsWith(fp)){const pfx=ls===-1?'':(dp==='/'?'/':dp+'/');m.push(pfx+k+(v.type==='directory'?'/':''))}}return m}
  return{root,resolve,absStr,getN,getPN,read,write,append,mkdir,rm,cp,mv,ln,findN,completions,_mkdirp,_mkfile,mkN,now};
})();

/* ====== PROCESS MANAGER ====== */
const PM=(()=>{let np=1;const P=[];
  function init(){P.length=0;np=1;add('init','root','S');add('bash','user','R');add('systemd','root','S');add('sshd','root','S');add('cron','root','S');add('dbus-daemon','root','S');add('rsyslogd','root','S')}
  function add(n,u,st){const pid=np++;P.push({pid,name:n,user:u||'user',status:st||'S',cpu:(Math.random()*2).toFixed(1),mem:(Math.random()*3).toFixed(1),vsz:Math.floor(Math.random()*100000+10000),rss:Math.floor(Math.random()*20000+1000),start:'00:'+String(Math.floor(Math.random()*60)).padStart(2,'0')});return pid}
  function kill(pid,sig=15){const i=P.findIndex(p=>p.pid===pid);if(i===-1)return`kill: (${pid}) - No such process`;if(P[i].name==='init'||P[i].name==='bash')return`kill: (${pid}) - Operation not permitted`;if(sig===9)P.splice(i,1);else P[i].status='T';return null}
  function list(){return[...P]}
  init();return{add,kill,list};
})();

/* ====== USER SYSTEM ====== */
const US=(()=>{const db={root:{uid:0,gid:0,home:'/root',shell:'/bin/bash'},user:{uid:1000,gid:1000,home:'/home/user',shell:'/bin/bash'},daemon:{uid:1,gid:1,home:'/usr/sbin',shell:'/usr/sbin/nologin'},nobody:{uid:65534,gid:65534,home:'/nonexistent',shell:'/usr/sbin/nologin'}};
  function addU(n){if(db[n])return`useradd: user '${n}' already exists`;db[n]={uid:1000+Object.keys(db).length,gid:1000+Object.keys(db).length,home:'/home/'+n,shell:'/bin/bash'};VFS._mkdirp('/home/'+n);return null}
  function delU(n){if(!db[n])return`userdel: user '${n}' does not exist`;if(n==='root'||n==='user')return`userdel: cannot remove essential user`;delete db[n];return null}
  function passwd(n){if(!db[n])return`passwd: user '${n}' does not exist`;return`passwd: password updated successfully for ${n}`}
  function getPF(){return Object.entries(db).map(([n,u])=>`${n}:x:${u.uid}:${u.gid}:${n}:${u.home}:${u.shell}`).join('\n')}
  function cur(){return'user'}function exists(n){return!!db[n]}
  return{addU,delU,passwd,getPF,cur,exists};
})();

/* ====== PACKAGE MANAGER ====== */
const Pkg=(()=>{const inst=new Set(['bash','coreutils','grep','sed','awk','tar','gzip','openssh-client','net-tools','apt']);const avail=['vim','nano','git','curl','wget','htop','tree','tmux','python3','nodejs','gcc','make','docker','nginx','mysql-server','postgresql','redis-server','ruby','php','golang','rust','neovim','zsh','fish','jq','ripgrep','cmake','clang'];
  function update(){return'Hit:1 http://archive.ubuntu.com/ubuntu jammy InRelease\nHit:2 http://archive.ubuntu.com/ubuntu jammy-updates InRelease\nReading package lists... Done\nBuilding dependency tree... Done\nAll packages are up to date.'}
  function install(p){if(inst.has(p))return`${p} is already the newest version.`;if(!avail.includes(p))return`E: Unable to locate package ${p}`;inst.add(p);const sz=Math.floor(Math.random()*5000+500);return`Reading package lists... Done\nBuilding dependency tree... Done\nThe following NEW packages will be installed:\n  ${p}\nGet:1 http://archive.ubuntu.com/ubuntu jammy/main amd64 ${p} [${sz} kB]\nSetting up ${p} ...\nProcessing triggers for man-db ...`}
  function remove(p){if(!inst.has(p))return`E: Package '${p}' is not installed`;if(p==='bash'||p==='coreutils'||p==='apt')return`E: Cannot remove essential package '${p}'`;inst.delete(p);return`Removing ${p} ...\nProcessing triggers for man-db ...`}
  function ls(){return[...inst]}return{update,install,remove,ls};
})();

/* ====== MAN PAGES ====== */
const Man={ls:'NAME\n    ls - list directory contents\nSYNOPSIS\n    ls [-la] [FILE]...\nOPTIONS\n    -a  show hidden files\n    -l  long listing format',cd:'NAME\n    cd - change directory\nSYNOPSIS\n    cd [dir]',grep:'NAME\n    grep - search for patterns\nSYNOPSIS\n    grep [-inrvc] PATTERN [FILE]...\nOPTIONS\n    -i ignore case  -n line numbers  -r recursive\n    -v invert  -c count',find:'NAME\n    find - search for files\nSYNOPSIS\n    find [path] [-name pattern] [-type f|d]',cat:'NAME\n    cat - concatenate files\nSYNOPSIS\n    cat [FILE]...',chmod:'NAME\n    chmod - change file mode\nSYNOPSIS\n    chmod MODE FILE',pwd:'NAME\n    pwd - print working directory',mkdir:'NAME\n    mkdir - make directories\nSYNOPSIS\n    mkdir [-p] DIR...',rm:'NAME\n    rm - remove files\nSYNOPSIS\n    rm [-rf] FILE...',cp:'NAME\n    cp - copy files\nSYNOPSIS\n    cp SOURCE DEST',mv:'NAME\n    mv - move files\nSYNOPSIS\n    mv SOURCE DEST',echo:'NAME\n    echo - display text\nSYNOPSIS\n    echo [-n] STRING...',touch:'NAME\n    touch - create file / update timestamp\nSYNOPSIS\n    touch FILE...',head:'NAME\n    head - output first lines\nSYNOPSIS\n    head [-n NUM] [FILE]...',tail:'NAME\n    tail - output last lines\nSYNOPSIS\n    tail [-n NUM] [-f] [FILE]...',wc:'NAME\n    wc - word/line/char count\nSYNOPSIS\n    wc [-lwc] [FILE]...',sort:'NAME\n    sort - sort lines\nSYNOPSIS\n    sort [-rnu] [FILE]...',uniq:'NAME\n    uniq - filter duplicates\nSYNOPSIS\n    uniq [-cd] [INPUT]',cut:'NAME\n    cut - select fields\nSYNOPSIS\n    cut -d DELIM -f LIST [FILE]...',sed:'NAME\n    sed - stream editor\nSYNOPSIS\n    sed \'s/OLD/NEW/[g]\' [FILE]',awk:'NAME\n    awk - pattern processing\nSYNOPSIS\n    awk [-F sep] \'{print $N}\' [FILE]...',ps:'NAME\n    ps - process status\nSYNOPSIS\n    ps [aux]',kill:'NAME\n    kill - signal process\nSYNOPSIS\n    kill [-9] PID',top:'NAME\n    top - process viewer\nSYNOPSIS\n    top',ping:'NAME\n    ping - test connectivity (simulated)\nSYNOPSIS\n    ping [-c N] HOST',tar:'NAME\n    tar - archive utility\nSYNOPSIS\n    tar [cxztf] ARCHIVE [FILES...]',apt:'NAME\n    apt - package manager\nSYNOPSIS\n    apt [update|install|remove] [PKG]',df:'NAME\n    df - disk space\nSYNOPSIS\n    df [-h]',du:'NAME\n    du - file space usage\nSYNOPSIS\n    du [-hs] [FILE]...',free:'NAME\n    free - memory usage\nSYNOPSIS\n    free [-h]',man:'NAME\n    man - manual pages\nSYNOPSIS\n    man COMMAND',chown:'NAME\n    chown - change owner\nSYNOPSIS\n    chown OWNER[:GROUP] FILE',less:'NAME\n    less - page viewer\nSYNOPSIS\n    less FILE',history:'NAME\n    history - show command history',tree:'NAME\n    tree - list directory tree\nSYNOPSIS\n    tree [-aL level] [dir]',ln:'NAME\n    ln - make links\nSYNOPSIS\n    ln -s TARGET LINK_NAME',stat:'NAME\n    stat - display file status\nSYNOPSIS\n    stat FILE...',diff:'NAME\n    diff - compare files\nSYNOPSIS\n    diff FILE1 FILE2',seq:'NAME\n    seq - print sequence of numbers\nSYNOPSIS\n    seq [FIRST [INCREMENT]] LAST',tee:'NAME\n    tee - read stdin, write to stdout and files\nSYNOPSIS\n    tee [-a] FILE...',xargs:'NAME\n    xargs - build and execute commands from stdin\nSYNOPSIS\n    xargs COMMAND',bc:'NAME\n    bc - calculator\nSYNOPSIS\n    echo "EXPR" | bc'};

/* ====== COMMANDS ====== */
const C={};
function fmtL(e){const pm=e.permissions||(e.type==='directory'?'drwxr-xr-x':'-rw-r--r--');const lk=e.type==='directory'?'2':'1';const ow=(e.owner||'user').padEnd(6);const gr=(e.group||'user').padEnd(6);const sz=String(e.size||0).padStart(6);const d=new Date(e.modifiedAt||Date.now());const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const ds=`${mo[d.getMonth()]} ${String(d.getDate()).padStart(2)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;const cl=e.type==='directory'?'\x1b[1;34m':(e.link?'\x1b[1;36m':(e.permissions&&e.permissions.includes('x')&&e.type!=='directory'?'\x1b[1;32m':''));const rs=(cl?'\x1b[0m':'');const linkS=e.link?' -> '+e.link:'';return`${pm} ${lk} ${ow} ${gr} ${sz} ${ds} ${cl}${e.name}${rs}${linkS}`}

C.pwd=(a,s)=>s.cwd;
C.ls=(args,s)=>{let sa=false,lo=false;const paths=[];for(const a of args){if(a.startsWith('-')){if(a.includes('a'))sa=true;if(a.includes('l'))lo=true}else paths.push(a)}if(!paths.length)paths.push('.');const res=[];for(const p of paths){const nd=VFS.getN(p,s.cwd);if(!nd)return`ls: cannot access '${p}': No such file or directory`;if(nd.type==='file'){res.push(lo?fmtL(nd):nd.name);continue}let ent=Object.values(nd.children);if(sa)ent=[{name:'.',type:'directory',permissions:nd.permissions,owner:nd.owner,group:nd.group,size:4096,modifiedAt:nd.modifiedAt},{name:'..',type:'directory',permissions:'drwxr-xr-x',owner:'root',group:'root',size:4096,modifiedAt:nd.modifiedAt},...ent];else ent=ent.filter(e=>!e.name.startsWith('.'));if(paths.length>1)res.push(p+':');if(lo){res.push('total '+ent.length*4);for(const e of ent)res.push(fmtL(e))}else res.push(ent.map(e=>e.type==='directory'?`\x1b[1;34m${e.name}\x1b[0m`:(e.link?`\x1b[1;36m${e.name}\x1b[0m`:e.name)).join('  '))}return res.join('\n')};
C.cd=(args,s)=>{const t=args[0]||'~';const abs=VFS.absStr(t,s.cwd);const nd=VFS.getN(t,s.cwd);if(!nd)return`bash: cd: ${t}: No such file or directory`;if(nd.type!=='directory')return`bash: cd: ${t}: Not a directory`;s.cwd=abs||'/';return''};
C.mkdir=(args,s)=>{if(!args.length)return'mkdir: missing operand';let mp=false;const dirs=[];for(const a of args){if(a==='-p')mp=true;else dirs.push(a)}const r=[];for(const d of dirs){if(mp)VFS._mkdirp(VFS.absStr(d,s.cwd));else{const e=VFS.mkdir(d,s.cwd);if(e)r.push(e)}}return r.join('\n')};

/* ====== PIPE ENGINE ====== */
const Pipe=(()=>{
  function tokenize(input){const tk=[];let cur='',inS=false,inD=false,esc=false;for(let i=0;i<input.length;i++){const c=input[i];if(esc){cur+=c;esc=false;continue}if(c==='\\'&&!inS){esc=true;continue}if(c==="'"&&!inD){inS=!inS;continue}if(c==='"'&&!inS){inD=!inD;continue}if(!inS&&!inD){if(c==='|'||c==='>'||c==='<'){if(cur){tk.push(cur);cur=''}if(c==='>'&&input[i+1]==='>'){tk.push('>>');i++}else tk.push(c);continue}if(c===' '||c==='\t'){if(cur){tk.push(cur);cur=''}continue}}cur+=c}if(cur)tk.push(cur);return tk}
  function splitP(tk){const sg=[];let cur=[];for(const t of tk){if(t==='|'){if(cur.length)sg.push(cur);cur=[]}else cur.push(t)}if(cur.length)sg.push(cur);return sg}
  function exRedir(tk){const args=[];const rd={out:null,oApp:null,in:null};for(let i=0;i<tk.length;i++){if(tk[i]==='>'&&tk[i+1])rd.out=tk[++i];else if(tk[i]==='>>'&&tk[i+1])rd.oApp=tk[++i];else if(tk[i]==='<'&&tk[i+1])rd.in=tk[++i];else args.push(tk[i])}return{args,rd}}
  function execute(raw,state){
    let tr=raw.trim();if(!tr)return'';
    /* History expansion */
    if(tr==='!!'){if(state.history.length)tr=state.history[state.history.length-1];else return'bash: !!: event not found'}
    else if(/^!(\d+)$/.test(tr)){const n=parseInt(tr.slice(1));if(n>0&&n<=state.history.length)tr=state.history[n-1];else return`bash: ${tr}: event not found`}
    else if(/^!-(\d+)$/.test(tr)){const n=parseInt(tr.slice(2));if(n>0&&n<=state.history.length)tr=state.history[state.history.length-n];else return`bash: ${tr}: event not found`}
    if(!tr)return'';
    if(tr.includes('&&')){const parts=tr.split(/\s*&&\s*/);const r=[];for(const p of parts){const res=execute(p.trim(),state);if(res)r.push(res)}return r.join('\n')}
    if(tr.includes(';')){const parts=tr.split(/\s*;\s*/);const r=[];for(const p of parts){if(p.trim()){const res=execute(p.trim(),state);if(res)r.push(res)}}return r.join('\n')}
    const tk=tokenize(tr);const segs=splitP(tk);
    let pIn=null,lastO='';
    for(let i=0;i<segs.length;i++){
      const{args,rd}=exRedir(segs[i]);if(!args.length)continue;
      const cn=args[0];const ca=args.slice(1);
      let stdin=pIn;if(rd.in){const c=VFS.read(rd.in,state.cwd);if(c===null)return`bash: ${rd.in}: No such file or directory`;stdin=c}
      let out='';if(C[cn])out=C[cn](ca,state,stdin)||'';else out=`bash: ${cn}: command not found`;
      if(rd.out){VFS.write(rd.out,state.cwd,out);out=''}else if(rd.oApp){VFS.append(rd.oApp,state.cwd,out);out=''}
      pIn=out;lastO=out;
    }
    return lastO;
  }
  return{execute};
})();

/* ====== TERMINAL UI ====== */
(function boot(){
  initFS();
  const el=document.getElementById('terminal');
  const mobileInput=document.getElementById('mobile-input');
  const isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)||('ontouchstart' in window&&window.innerWidth<=1024);
  const st={cwd:'/home/user',history:[],historyIdx:-1,input:'',cursor:0,saved:''};

  function promptH(){let dp=st.cwd;if(dp.startsWith('/home/user'))dp='~'+dp.slice(10);if(!dp)dp='~';return`<span class="prompt-user">user@weblinux</span><span class="prompt-sym">:</span><span class="prompt-path">${dp}</span><span class="prompt-sym">$ </span>`}
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function renderInput(){
    let il=document.getElementById('il');
    if(!il){il=document.createElement('div');il.id='il';il.style.display='inline';el.appendChild(il)}
    const b=esc(st.input.slice(0,st.cursor));
    const cc=st.cursor<st.input.length?esc(st.input[st.cursor]):' ';
    const a=st.cursor<st.input.length?esc(st.input.slice(st.cursor+1)):'';
    il.innerHTML=promptH()+b+'<span class="cursor-char cursor-blink">'+cc+'</span>'+a;
  }
  function syncMobile(){if(mobileInput){mobileInput.value=st.input;mobileInput.selectionStart=st.cursor;mobileInput.selectionEnd=st.cursor}}
  function wl(html){const d=document.createElement('div');d.className='output-line';d.innerHTML=html;el.appendChild(d)}
  function writeOut(text){if(!text)return;const h=Ansi.toHtml(text);h.split('\n').forEach(l=>wl(l||' '))}
  function removeIL(){const il=document.getElementById('il');if(il)il.remove()}
  function scroll(){el.scrollTop=el.scrollHeight}
  function submit(){
    const input=st.input;removeIL();wl(promptH()+esc(input));st.input='';st.cursor=0;
    const tr=input.trim();
    if(tr){st.history.push(tr);st.historyIdx=st.history.length;const r=Pipe.execute(tr,st);if(r==='\x1b[CLEAR]')el.innerHTML='';else if(r)writeOut(r)}
    renderInput();syncMobile();scroll();
  }

  /* Boot message */
  const bm=[
    '\x1b[1;36m\u2554\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2557\x1b[0m',
    '\x1b[1;36m\u2551\x1b[0m  \x1b[1;37mWebLinux Terminal v2.0\x1b[0m                                \x1b[1;36m\u2551\x1b[0m',
    '\x1b[1;36m\u2551\x1b[0m  \x1b[90mA browser-based Linux environment\x1b[0m                    \x1b[1;36m\u2551\x1b[0m',
    '\x1b[1;36m\u2551\x1b[0m  \x1b[33mKernel:\x1b[0m 6.5.0-generic  \x1b[33mShell:\x1b[0m bash 5.2  \x1b[33mCmds:\x1b[0m 70+ \x1b[1;36m\u2551\x1b[0m',
    '\x1b[1;36m\u2551\x1b[0m  \x1b[90mType "help" for commands \u00b7 "man <cmd>" for details\x1b[0m     \x1b[1;36m\u2551\x1b[0m',
    '\x1b[1;36m\u255A\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255D\x1b[0m',''
  ];
  bm.forEach(l=>writeOut(l));renderInput();scroll();

  /* Tab completion */
  function handleTab(){
    const parts=st.input.split(/\s+/);
    if(parts.length<=1){const partial=parts[0]||'';const m=Object.keys(C).filter(c=>c.startsWith(partial)&&c!=='[');if(m.length===1){st.input=m[0]+' ';st.cursor=st.input.length;renderInput();syncMobile()}else if(m.length>1){removeIL();wl(promptH()+esc(st.input));wl(m.join('  '));renderInput();syncMobile()}}
    else{const partial=parts[parts.length-1];const comps=VFS.completions(partial,st.cwd);if(comps.length===1){parts[parts.length-1]=comps[0];st.input=parts.join(' ');st.cursor=st.input.length;renderInput();syncMobile()}else if(comps.length>1){let common=comps[0];for(let i=1;i<comps.length;i++){while(!comps[i].startsWith(common))common=common.slice(0,-1)}if(common.length>partial.length){parts[parts.length-1]=common;st.input=parts.join(' ');st.cursor=st.input.length;renderInput();syncMobile()}else{removeIL();wl(promptH()+esc(st.input));wl(comps.join('  '));renderInput();syncMobile()}}}scroll()
  }

  /* Shared key handler */
  function handleKey(k,ctrl,alt,meta){
    if(ctrl&&k==='c'){removeIL();wl(promptH()+esc(st.input)+'^C');st.input='';st.cursor=0;renderInput();syncMobile();scroll();return}
    if(ctrl&&k==='l'){el.innerHTML='';renderInput();syncMobile();scroll();return}
    if(ctrl&&k==='a'){st.cursor=0;renderInput();syncMobile();return}
    if(ctrl&&k==='e'){st.cursor=st.input.length;renderInput();syncMobile();return}
    if(ctrl&&k==='u'){st.input=st.input.slice(st.cursor);st.cursor=0;renderInput();syncMobile();return}
    if(ctrl&&k==='k'){st.input=st.input.slice(0,st.cursor);renderInput();syncMobile();return}
    if(ctrl&&k==='w'){const b=st.input.slice(0,st.cursor);const a=st.input.slice(st.cursor);const t=b.trimEnd();const ls=t.lastIndexOf(' ');const nb=ls===-1?'':t.slice(0,ls+1);st.input=nb+a;st.cursor=nb.length;renderInput();syncMobile();return}
    if(k==='Tab'){handleTab();return}
    if(k==='Enter'){submit();return}
    if(k==='Backspace'){if(st.cursor>0){st.input=st.input.slice(0,st.cursor-1)+st.input.slice(st.cursor);st.cursor--;renderInput();syncMobile();scroll()}return}
    if(k==='Delete'){if(st.cursor<st.input.length){st.input=st.input.slice(0,st.cursor)+st.input.slice(st.cursor+1);renderInput();syncMobile()}return}
    if(k==='ArrowUp'){if(st.historyIdx===st.history.length)st.saved=st.input;if(st.historyIdx>0){st.historyIdx--;st.input=st.history[st.historyIdx];st.cursor=st.input.length;renderInput();syncMobile();scroll()}return}
    if(k==='ArrowDown'){if(st.historyIdx<st.history.length){st.historyIdx++;st.input=st.historyIdx===st.history.length?st.saved:st.history[st.historyIdx];st.cursor=st.input.length;renderInput();syncMobile();scroll()}return}
    if(k==='ArrowLeft'){if(st.cursor>0){st.cursor--;renderInput();syncMobile()}return}
    if(k==='ArrowRight'){if(st.cursor<st.input.length){st.cursor++;renderInput();syncMobile()}return}
    if(k==='Home'){st.cursor=0;renderInput();syncMobile();return}
    if(k==='End'){st.cursor=st.input.length;renderInput();syncMobile();return}
    if(k.length===1&&!ctrl&&!alt&&!meta){st.input=st.input.slice(0,st.cursor)+k+st.input.slice(st.cursor);st.cursor++;renderInput();syncMobile();scroll()}
  }

  /* Desktop keyboard */
  document.addEventListener('keydown',function(ev){
    if(ev.target===mobileInput)return; /* Let mobile handler deal with it */
    ev.preventDefault();
    handleKey(ev.key,ev.ctrlKey,ev.altKey,ev.metaKey);
  });

  /* Paste */
  document.addEventListener('paste',function(ev){ev.preventDefault();const t=(ev.clipboardData||window.clipboardData).getData('text').replace(/[\r\n]+/g,'');st.input=st.input.slice(0,st.cursor)+t+st.input.slice(st.cursor);st.cursor+=t.length;renderInput();syncMobile();scroll()});

  /* ====== MOBILE INPUT HANDLING ====== */
  function focusMobile(){if(mobileInput){mobileInput.value=st.input;mobileInput.focus({preventScroll:true})}}

  /* Track mobile input changes via 'input' event */
  let composing=false;
  mobileInput.addEventListener('compositionstart',()=>{composing=true});
  mobileInput.addEventListener('compositionend',()=>{composing=false;syncFromMobile()});

  function syncFromMobile(){
    const newVal=mobileInput.value;
    /* Just replace our state with whatever the mobile input has */
    st.input=newVal;
    st.cursor=mobileInput.selectionStart||newVal.length;
    renderInput();scroll();
  }

  mobileInput.addEventListener('input',function(){
    if(!composing)syncFromMobile();
  });

  mobileInput.addEventListener('keydown',function(ev){
    if(ev.key==='Enter'){
      ev.preventDefault();
      submit();
      mobileInput.value='';
      /* Keep keyboard open */
      setTimeout(()=>{mobileInput.blur();mobileInput.focus({preventScroll:true})},50);
    }
  });

  /* Terminal click -> focus */
  el.addEventListener('click',function(){
    if(isMobile)focusMobile();else el.focus();
  });

  /* Toolbar buttons */
  document.getElementById('mobile-toolbar').addEventListener('touchstart',function(ev){
    ev.preventDefault();ev.stopPropagation();
    const btn=ev.target.closest('.tb-btn');if(!btn)return;

    if(btn.dataset.key){
      handleKey(btn.dataset.key,false,false,false);
    }else if(btn.dataset.ctrl){
      handleKey(btn.dataset.ctrl,true,false,false);
    }else if(btn.dataset.insert){
      const ch=btn.dataset.insert;
      st.input=st.input.slice(0,st.cursor)+ch+st.input.slice(st.cursor);
      st.cursor++;
      renderInput();scroll();
    }
    syncMobile();
    /* Keep focus on mobile input to keep keyboard visible */
    setTimeout(()=>focusMobile(),10);
  },{passive:false});

  /* Handle resize (keyboard open/close on mobile) */
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',function(){
      el.style.height=window.visualViewport.height+'px';
      scroll();
    });
    window.visualViewport.addEventListener('scroll',function(){
      el.style.height=window.visualViewport.height+'px';
    });
  }

  /* Auto-focus on load */
  if(isMobile){setTimeout(()=>focusMobile(),300)}else{el.focus()}
})();
